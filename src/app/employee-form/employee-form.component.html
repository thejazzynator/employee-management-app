<h2 class="text-center my-5">{{ isEditing ? 'Edit' : 'Create' }} Employee</h2>

<div *ngIf="errorMessage" !="">
    {{errorMessage}}
</div>

<form (ngSubmit)="submitForm()"> 
    <div class="mb-3">
        <label class="form-label" for="firstName">First Name:</label>
        <input type="text" [(ngModel)]="employee.firstName" name="firstName" class="form-control" />
    </div>
    <div class="mb-3">
        <label class="form-label" for="lastName">Last Name:</label>
        <input type="text" [(ngModel)]="employee.lastName" name="lastName" class="form-control" />
    </div>
    <div class="mb-3">
        <label class="form-label" for="phone">Phone:</label>
        <input type="text" [(ngModel)]="employee.phoneNumber" name="phone" class="form-control" />
    </div>
    <div class="mb-3">
        <label class="form-label" for="email">Email:</label>
        <input type="email" [(ngModel)]="employee.email" name="email" class="form-control" />
    </div>
    <div class="mb-3">
        <label class="form-label" for="position">Position:</label>
        <select [(ngModel)]="employee.position" name="position" class="form-control">
            <option value="Manager">Manager</option>
            <option value="Developer">Developer</option>
            <option value="Designer">Designer</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">{{ isEditing ? 'Edit' : 'Create' }}</button>
</form>
