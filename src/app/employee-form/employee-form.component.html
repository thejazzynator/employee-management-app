<h2 class="text-center my-5">{{ isEditing ? 'Edit' : 'Create' }} Employee</h2>

<div class="alert alert-danger text-center" *ngIf="errorMessage">
    {{errorMessage}}
</div>

<form (ngSubmit)="submitForm()" #employeeForm="ngForm" class="border p-4 rounded shadow-sm" style="max-width: 500px; margin: auto;">
    <div class="mb-3">
        <label class="form-label" for="firstName">First Name:</label>
        <input type="text" required #firstName="ngModel" [(ngModel)]="employee.firstName" name="firstName"
            class="form-control" />

        <div *ngIf="firstName.invalid && (firstName.touched || firstName.dirty)" class="text-danger">
            <div *ngIf="firstName.errors?.['required']">First Name is required</div>
        </div>

    </div>
    <div class="mb-3">
        <label class="form-label" for="lastName">Last Name:</label>
        <input type="text" required #lastName="ngModel" [(ngModel)]="employee.lastName" name="lastName"
            class="form-control" />
        <div *ngIf="lastName.invalid && (lastName.touched || lastName.dirty)" class="text-danger">
            Last name is required
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label" for="phone">Phone:</label>
        <input type="text" required #phone="ngModel" [(ngModel)]="employee.phoneNumber" name="phone"
            class="form-control" />
        <div *ngIf="phone.invalid && (phone.touched || phone.dirty)" class="text-danger">
            Phone number is required
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label" for="email">Email:</label>
        <input type="email" required #email="ngModel" [(ngModel)]="employee.email" name="email" class="form-control" />
        <div *ngIf="email.invalid && (email.touched || email.dirty)" class="text-danger">
            Email is required
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label" for="position">Position:</label>
        <select required #position="ngModel" [(ngModel)]="employee.position" name="position" class="form-control">
            <option value="" disabled selected>Select Position</option>
            <option value="Manager">Manager</option>
            <option value="Developer">Developer</option>
            <option value="Designer">Designer</option>
            <option value="QA Engineer">QA Engineer</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="employeeForm.invalid">{{ isEditing ? 'Edit' : 'Create' }}</button>
</form>
